<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img"
     aria-label="OAS Studio pipeline: spectroscopy to spectral image to deep network to species concentrations and validation.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1e1b4b"/>
      <stop offset="38%" stop-color="#3b2596"/>
      <stop offset="72%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#a21caf"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f4ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%"  stop-color="rgba(255,255,255,.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.10)"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f97316"/>
    </marker>
    <style>
      .h1   { font: 800 30px Inter, system-ui, sans-serif; fill: #ffffff; letter-spacing:-0.01em; }
      .h2   { font: 700 18px Inter, system-ui, sans-serif; fill: #ffffff; opacity:.92; }
      .lbl  { font: 600 14px Inter, system-ui, sans-serif; fill: #0f172a; }
      .lblw { font: 600 14px Inter, system-ui, sans-serif; fill: #ffffff; }
      .mono { font: 600 12px 'JetBrains Mono', monospace; fill: #c4b5fd; letter-spacing: .04em; }
      .pill { font: 700 11px 'JetBrains Mono', monospace; fill: #ffffff; letter-spacing: .08em; text-transform: uppercase; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="540" fill="url(#bg)"/>
  <rect width="1200" height="540" fill="url(#dots)"/>
  <circle cx="120" cy="80"  r="240" fill="url(#glow)"/>
  <circle cx="1100" cy="500" r="220" fill="url(#glow)"/>

  <!-- Header pill -->
  <g transform="translate(60,42)">
    <rect width="218" height="26" rx="13" fill="rgba(255,255,255,.16)" stroke="rgba(255,255,255,.32)"/>
    <circle cx="14" cy="13" r="4" fill="#34d399"/>
    <text x="26" y="17" class="pill">OAS · CONTINUAL LEARNING</text>
  </g>

  <!-- Title -->
  <text x="60" y="118" class="h1">OAS Spectrum Studio</text>
  <text x="60" y="148" class="h2">Single-screen analyser. Community-grown ML.</text>

  <!-- Stage panels -->
  <!-- Stage 1: Spectroscopy -->
  <g transform="translate(60, 200)">
    <rect width="200" height="240" rx="14" fill="url(#card)"/>
    <text x="100" y="32" text-anchor="middle" class="lbl">① Spectroscopy</text>
    <!-- simple lamp + cell illustration -->
    <g transform="translate(20,52)">
      <circle cx="16" cy="80" r="14" fill="#fde68a" stroke="#f59e0b"/>
      <line x1="30" y1="80" x2="60" y2="80" stroke="#0f172a" stroke-width="2"/>
      <rect x="60" y="60" width="60" height="40" rx="4" fill="#e0e7ff" stroke="#6366f1"/>
      <line x1="120" y1="80" x2="150" y2="80" stroke="#0f172a" stroke-width="2"/>
      <circle cx="160" cy="80" r="10" fill="#fca5a5" stroke="#dc2626"/>
      <text x="80" y="135" text-anchor="middle" class="lbl" font-size="11">I₀ &nbsp; · &nbsp; It</text>
    </g>
  </g>

  <!-- Arrow 1 -->
  <line x1="270" y1="320" x2="305" y2="320" stroke="#f97316" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Stage 2: Spectrum / OD -->
  <g transform="translate(315, 200)">
    <rect width="200" height="240" rx="14" fill="url(#card)"/>
    <text x="100" y="32" text-anchor="middle" class="lbl">② Optical depth</text>
    <g transform="translate(16, 56)">
      <!-- mini OD curve -->
      <polyline fill="none" stroke="#0f172a" stroke-width="2"
        points="0,140 12,138 24,134 36,128 48,114 60,90 72,72 84,58 96,50 108,60 120,82 132,108 144,126 156,134 168,138" />
      <polyline fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="4 3"
        points="0,142 12,140 24,135 36,127 48,113 60,89 72,73 84,57 96,51 108,61 120,83 132,107 144,127 156,135 168,139" />
      <text x="80" y="170" text-anchor="middle" class="lbl" font-size="11">log(I₀/It)</text>
    </g>
  </g>

  <!-- Arrow 2 -->
  <line x1="525" y1="320" x2="560" y2="320" stroke="#f97316" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Stage 3: Network -->
  <g transform="translate(570, 200)">
    <rect width="200" height="240" rx="14" fill="url(#card)"/>
    <text x="100" y="32" text-anchor="middle" class="lbl">③ NNLS  ·  ResNet101</text>
    <!-- mini network -->
    <g transform="translate(20, 60)" stroke="#6366f1" stroke-width="1.5" fill="#a5b4fc">
      <circle cx="10"  cy="20" r="6"/>
      <circle cx="10"  cy="60" r="6"/>
      <circle cx="10"  cy="100" r="6"/>
      <circle cx="10"  cy="140" r="6"/>
      <circle cx="70"  cy="40" r="6"/>
      <circle cx="70"  cy="80" r="6"/>
      <circle cx="70"  cy="120" r="6"/>
      <circle cx="130" cy="20" r="6"/>
      <circle cx="130" cy="60" r="6"/>
      <circle cx="130" cy="100" r="6"/>
      <circle cx="130" cy="140" r="6"/>
      <g stroke-opacity=".5">
        <line x1="10" y1="20" x2="70" y2="40"/><line x1="10" y1="20" x2="70" y2="80"/><line x1="10" y1="20" x2="70" y2="120"/>
        <line x1="10" y1="60" x2="70" y2="40"/><line x1="10" y1="60" x2="70" y2="80"/><line x1="10" y1="60" x2="70" y2="120"/>
        <line x1="10" y1="100" x2="70" y2="40"/><line x1="10" y1="100" x2="70" y2="80"/><line x1="10" y1="100" x2="70" y2="120"/>
        <line x1="10" y1="140" x2="70" y2="40"/><line x1="10" y1="140" x2="70" y2="80"/><line x1="10" y1="140" x2="70" y2="120"/>
        <line x1="70" y1="40" x2="130" y2="20"/><line x1="70" y1="40" x2="130" y2="60"/><line x1="70" y1="40" x2="130" y2="100"/><line x1="70" y1="40" x2="130" y2="140"/>
        <line x1="70" y1="80" x2="130" y2="20"/><line x1="70" y1="80" x2="130" y2="60"/><line x1="70" y1="80" x2="130" y2="100"/><line x1="70" y1="80" x2="130" y2="140"/>
        <line x1="70" y1="120" x2="130" y2="20"/><line x1="70" y1="120" x2="130" y2="60"/><line x1="70" y1="120" x2="130" y2="100"/><line x1="70" y1="120" x2="130" y2="140"/>
      </g>
    </g>
  </g>

  <!-- Arrow 3 -->
  <line x1="780" y1="320" x2="815" y2="320" stroke="#f97316" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Stage 4: 8 species bar -->
  <g transform="translate(825, 200)">
    <rect width="320" height="240" rx="14" fill="url(#card)"/>
    <text x="160" y="32" text-anchor="middle" class="lbl">④ 8-species number density</text>
    <!-- 8 vertical bars with species colours -->
    <g transform="translate(28, 60)">
      <g>
        <rect x="0"   y="50" width="24" height="120" fill="#a855f7"/>
        <rect x="36"  y="100" width="24" height="70" fill="#ec4899"/>
        <rect x="72"  y="110" width="24" height="60" fill="#14b8a6"/>
        <rect x="108" y="40"  width="24" height="130" fill="#ef4444"/>
        <rect x="144" y="10"  width="24" height="160" fill="#22c55e"/>
        <rect x="180" y="80"  width="24" height="90" fill="#eab308"/>
        <rect x="216" y="120" width="24" height="50" fill="#f97316"/>
        <rect x="252" y="20"  width="24" height="150" fill="#0ea5e9"/>
      </g>
      <g class="lbl" font-size="10" text-anchor="middle">
        <text x="12"  y="186">HONO</text>
        <text x="48"  y="186">HONO₂</text>
        <text x="84"  y="186">N₂O₄</text>
        <text x="120" y="186">N₂O₅</text>
        <text x="156" y="186">NO</text>
        <text x="192" y="186">NO₂</text>
        <text x="228" y="186">NO₃</text>
        <text x="264" y="186">O₃</text>
      </g>
    </g>
  </g>

  <!-- Bottom band: continual learning loop -->
  <g transform="translate(60, 470)">
    <rect width="1080" height="48" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
    <text x="20" y="30" class="lblw" font-size="14">
      Submitted analyses
      <tspan dx="6" dy="0">→</tspan>
      <tspan dx="6">curation worker</tspan>
      <tspan dx="6" dy="0">→</tspan>
      <tspan dx="6">fine-tuned release</tspan>
      <tspan dx="6" dy="0">→</tspan>
      <tspan dx="6">improved baseline ↺</tspan>
    </text>
    <text x="1060" y="30" text-anchor="end" class="mono">v1.0</text>
  </g>
</svg>
